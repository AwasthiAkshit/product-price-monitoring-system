<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrupy Intelligence</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --primary: #8b5cf6;
            --secondary: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-dark), #0f172a);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 2rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            padding: 0.75rem 1.5rem;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .stat-value {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: baseline;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .product-card:hover::before {
            opacity: 1;
        }

        .brand-badge {
            align-self: flex-start;
            background: rgba(255,255,255,0.1);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--secondary);
            text-transform: uppercase;
        }

        .product-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 1rem 0;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.8rem;
        }

        .product-details {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: auto;
        }

        .price-container {
            display: flex;
            flex-direction: column;
        }

        .price-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .price {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            color: white;
        }

        .source-tag {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0,0,0,0.3);
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
        }
        
        #loader {
            text-align: center;
            padding: 4rem;
            color: var(--secondary);
            font-size: 2rem;
        }
        
        .spin {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        #error-msg {
            display: none;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 600;
        }
        
        #toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 9999;
        }

        .toast {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-left: 4px solid var(--primary);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-family: 'Inter', sans-serif;
            animation: slideIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateX(100%);
            width: 320px;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div class="container">
        <header>
            <h1>Entrupy Intelligence</h1>
            <button class="btn" onclick="refreshData()">
                <i class="fas fa-sync-alt" id="refresh-icon"></i> Refresh Database
            </button>
        </header>

        <div id="error-msg">Cannot connect to backend API on http://localhost:8000. Is it running?</div>

        <div class="stats-grid" id="stats">
            <!-- Stats injected here -->
        </div>

        <div id="loader"><i class="fas fa-circle-notch spin"></i></div>

        <div class="products-grid" id="products">
            <!-- Products injected here -->
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        const API_HEADERS = { 'X-API-Key': 'secret-token-123' };

        async function init() {
            try {
                await Promise.all([fetchAnalytics(), fetchProducts()]);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('error-msg').style.display = 'none';
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('error-msg').style.display = 'block';
                console.error(e);
            }
        }

        async function fetchAnalytics() {
            const res = await fetch(`${API_URL}/analytics`, { headers: API_HEADERS });
            const data = await res.json();
            
            const statsHtml = `
                <div class="stat-card">
                    <span class="stat-label"><i class="fas fa-box-open"></i> Monitored Items</span>
                    <span class="stat-value">${data.total_products.toLocaleString()}</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label"><i class="fas fa-tag"></i> Average Market Price</span>
                    <span class="stat-value"><span style="font-size: 1.5rem; margin-right: 4px; color: var(--secondary)">$</span>${Math.round(data.average_price).toLocaleString()}</span>
                </div>
            `;
            document.getElementById('stats').innerHTML = statsHtml;
        }

        async function fetchProducts() {
            const res = await fetch(`${API_URL}/products`, { headers: API_HEADERS });
            const data = await res.json();
            
            const productsHtml = data.map(p => `
                <div class="product-card">
                    <span class="brand-badge">${p.brand || 'Luxury'}</span>
                    <h3 class="product-name">${p.name || 'Unknown Product'}</h3>
                    <div class="product-details">
                        <div class="price-container">
                            <span class="price-label">Current Market Value</span>
                            <span class="price"><span style="font-size: 1.25rem; color: var(--secondary); margin-right: 2px;">$</span>${p.current_price ? p.current_price.toLocaleString() : 'N/A'}</span>
                        </div>
                        <span class="source-tag"><i class="fas fa-database"></i> ${p.source}</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('products').innerHTML = productsHtml;
        }

        function showToast(message, color = 'var(--primary)') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = color;
            toast.innerHTML = message;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease-in forwards';
                setTimeout(() => toast.remove(), 300);
            }, 6000);
        }

        async function refreshData() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('spin');
            
            try {
                const res = await fetch(`${API_URL}/refresh`, { headers: API_HEADERS });
                const data = await res.json();
                
                showToast(`Data Sync Complete!<br><small>Created: ${data.created} | Updated: ${data.updated} | Unchanged: ${data.no_change}</small>`, 'var(--primary)');
                
                if (data.price_changes && data.price_changes.length > 0) {
                    data.price_changes.forEach((change, i) => {
                        setTimeout(() => {
                            const isDrop = change.new_price < change.old_price;
                            const color = isDrop ? '#10b981' : '#ef4444'; 
                            const iconHtml = isDrop ? '<i class="fas fa-arrow-down"></i>' : '<i class="fas fa-arrow-up"></i>';
                            const title = isDrop ? 'Price Drop!' : 'Price Increase Alert!';
                            const diff = Math.abs(change.new_price - change.old_price).toLocaleString();
                            
                            showToast(`
                                <div style="font-weight: bold; margin-bottom: 5px; color: ${color};">${iconHtml} ${title}</div>
                                <div style="font-size: 0.9rem; margin-bottom: 5px; line-height: 1.3;">${change.name}</div>
                                <div style="font-size: 0.85rem; color: var(--text-muted);">
                                    $${change.old_price.toLocaleString()} &rarr; <strong style="color: white;">$${change.new_price.toLocaleString()}</strong> <br>
                                    <span style="color: ${color}">${isDrop ? '-' : '+'}$${diff}</span>
                                </div>
                            `, color);
                        }, (i + 1) * 300); // Stagger notifications
                    });
                }
                
                await init();
            } catch (e) {
                showToast('Connection error while refreshing.', '#ef4444');
            } finally {
                icon.classList.remove('spin');
            }
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
